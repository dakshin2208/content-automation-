# Build and deploy the Next.js (standalone) app to Azure App Service.
# Fixes vs the auto-generated workflow:
#  - assembles the standalone bundle (copies .next/static + public into it)
#  - uploads ONLY the standalone folder with include-hidden-files (so .next/server.js ships)
#  - strips any stray .env so Azure App Settings are the single source of truth
# Requires the App Service Startup Command to be:  node server.js

name: Build and deploy Node.js app to Azure Web App - lm-content-automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          rm -rf .next/standalone/public
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          rm -f .next/standalone/.env

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_48B3CC4F2E5F4E15B7FA42E25B8CF07A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5FE179EE813D4D33ADE742F272759FB7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0F1A3C29E59648EA9707477A2F6F141E }}

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "lm-content-automation"
          slot-name: "Production"
          package: .
