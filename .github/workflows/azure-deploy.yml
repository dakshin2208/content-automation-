name: Build and deploy to Azure App Service

# Every push to main deploys automatically. You can also trigger it manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── EDIT THIS to your Azure Web App name ──────────────────────────────
env:
  AZURE_WEBAPP_NAME: lm-content-automation
  NODE_VERSION: "20.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js standalone)
        run: npm run build

      # Standalone build doesn't include static assets or /public — copy them in.
      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone
